name: zeroed
description: "Professional invoicing for solo freelancers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  auto_route: ^9.2.2

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.8.2

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Environment
  envied: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  lucide_icons_flutter: ^1.1.5
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.0
  share_plus: ^10.0.1

  # Payments / Subscriptions
  purchases_flutter: ^8.1.0

  # PDF
  pdf: ^3.10.0
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2
  auto_route_generator: ^9.0.0
  envied_generator: ^1.1.0

flutter:
  uses-material-design: true
